apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base

namespace: consorcio-prod

patches:
  - target:
      kind: Deployment
      name: consorcio-backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 5
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"

  - target:
      kind: HorizontalPodAutoscaler
      name: consorcio-backend
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 5
      - op: replace
        path: /spec/maxReplicas
        value: 50

images:
  - name: PLACEHOLDER_IMAGE
    newName: 123456789.dkr.ecr.us-east-1.amazonaws.com/consorciopro-backend
    newTag: latest
  - name: PLACEHOLDER_FRONTEND_IMAGE
    newName: 123456789.dkr.ecr.us-east-1.amazonaws.com/consorciopro-frontend
    newTag: latest
