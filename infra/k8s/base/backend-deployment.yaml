apiVersion: apps/v1
kind: Deployment
metadata:
  name: consorcio-backend
  namespace: consorcio
  labels:
    app: consorcio-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: consorcio-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0        # zero-downtime deploy
  template:
    metadata:
      labels:
        app: consorcio-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: backend
          image: PLACEHOLDER_IMAGE   # substituído no deploy pelo CI/CD
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: consorcio-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: consorcio-secrets
                  key: JWT_SECRET
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: consorcio-secrets
                  key: REDIS_URL
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: consorcio-config
                  key: KAFKA_BROKERS
          # Liveness: reinicia o pod se travar
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          # Readiness: remove do LB se não estiver pronto
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          # Startup: tempo extra para cold start
          startupProbe:
            httpGet:
              path: /api/v1/health/live
              port: 3000
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]  # drena conexões antes de parar
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [consorcio-backend]
                topologyKey: kubernetes.io/hostname  # espalha em nós diferentes
---
apiVersion: v1
kind: Service
metadata:
  name: consorcio-backend
  namespace: consorcio
spec:
  selector:
    app: consorcio-backend
  ports:
    - port: 80
      targetPort: 3000
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: consorcio-backend
  namespace: consorcio
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: consorcio-backend
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
