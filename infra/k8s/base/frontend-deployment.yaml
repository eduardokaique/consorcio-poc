apiVersion: apps/v1
kind: Deployment
metadata:
  name: consorcio-frontend
  namespace: consorcio
  labels:
    app: consorcio-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: consorcio-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: consorcio-frontend
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: frontend
          image: PLACEHOLDER_FRONTEND_IMAGE
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: BACKEND_URL
              value: "http://consorcio-backend"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: consorcio-frontend
  namespace: consorcio
spec:
  selector:
    app: consorcio-frontend
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: consorcio-ingress
  namespace: consorcio
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: PLACEHOLDER_ACM_ARN
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: /api/health
spec:
  rules:
    - host: app.consorciopro.com.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: consorcio-frontend
                port:
                  number: 80
    - host: api.consorciopro.com.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: consorcio-backend
                port:
                  number: 80
