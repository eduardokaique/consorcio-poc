name: CI — ConsorcioPro

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # QUALIDADE DE CÓDIGO
  # ─────────────────────────────────────────
  lint-and-types:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/backend/package-lock.json

      - name: Install dependencies
        working-directory: src/backend
        run: npm ci

      - name: Lint
        working-directory: src/backend
        run: npm run lint

      - name: Type check
        working-directory: src/backend
        run: npm run type-check

  # ─────────────────────────────────────────
  # TESTES UNITÁRIOS
  # ─────────────────────────────────────────
  unit-tests:
    name: Testes Unitários
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/backend/package-lock.json

      - name: Install dependencies
        working-directory: src/backend
        run: npm ci

      - name: Run unit tests
        working-directory: src/backend
        run: npm run test -- --coverage --coverageThreshold='{"global":{"lines":80}}'

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: src/backend/coverage
          flags: backend-unit

  # ─────────────────────────────────────────
  # SEGURANÇA (SAST)
  # ─────────────────────────────────────────
  sast:
    name: Análise de Segurança (SAST)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - uses: github/codeql-action/autobuild@v3

      - uses: github/codeql-action/analyze@v3

      - name: Snyk — dependências vulneráveis
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=src/backend/package.json
        continue-on-error: false

  # ─────────────────────────────────────────
  # BUILD DOCKER
  # ─────────────────────────────────────────
  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: [lint-and-types, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: src/backend
          push: false
          tags: consorciopro-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # TESTES DE INTEGRAÇÃO
  # ─────────────────────────────────────────
  integration-tests:
    name: Testes de Integração
    runs-on: ubuntu-latest
    needs: [build]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: consorcio
          POSTGRES_PASSWORD: consorcio_test
          POSTGRES_DB: consorcio_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/backend/package-lock.json

      - name: Install dependencies
        working-directory: src/backend
        run: npm ci

      - name: Run migrations
        working-directory: src/backend
        env:
          DATABASE_URL: postgresql://consorcio:consorcio_test@localhost:5432/consorcio_test
        run: npx prisma migrate deploy

      - name: Run integration tests
        working-directory: src/backend
        env:
          DATABASE_URL: postgresql://consorcio:consorcio_test@localhost:5432/consorcio_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test_secret_only
          NODE_ENV: test
        run: npm run test:integration

  # ─────────────────────────────────────────
  # DEPLOY PREVIEW (staging efêmero)
  # ─────────────────────────────────────────
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [integration-tests, sast]
    if: github.event_name == 'pull_request'
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: pr-${{ github.event.number }}-${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/consorciopro-backend:$IMAGE_TAG src/backend
          docker push $ECR_REGISTRY/consorciopro-backend:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/consorciopro-backend:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Deploy to EKS (preview namespace)
        id: deploy
        env:
          IMAGE: ${{ steps.build-image.outputs.image }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          kubectl set image deployment/backend backend=$IMAGE \
            -n preview-pr-$PR_NUMBER --record || \
          helm upgrade --install consorcio-pr-$PR_NUMBER ./infra/k8s/chart \
            --namespace preview-pr-$PR_NUMBER --create-namespace \
            --set image.tag=pr-$PR_NUMBER-${{ github.sha }}
          echo "url=https://pr-$PR_NUMBER.preview.consorciopro.com.br" >> $GITHUB_OUTPUT
